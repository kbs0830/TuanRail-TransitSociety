{% block body_class %}subpage-body{% endblock %}
{% block content %}
  <main id="mainContent" class="subpage-main" tabindex="-1">

      <a class="subpage-brandlink" href="/">
        <img src="{{ static_url('images/logo.jpg') }}" alt="团‧鐵道" class="subpage-brand-logo" width="38" height="38" loading="eager" decoding="async">
