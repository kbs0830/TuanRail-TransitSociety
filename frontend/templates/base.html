<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}团‧鐵道{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}团‧鐵道官方網站{% endblock %}">
  <link rel="icon" type="image/jpeg" href="{{ static_url('images/logo.jpg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ static_url('css/index.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <a href="#mainContent" class="skip-link">跳到主要內容</a>
  <div class="grain"></div>
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
